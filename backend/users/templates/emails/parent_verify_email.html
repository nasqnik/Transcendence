<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Verify your email — {{ app_name }}</title>
  </head>
  <body style="font-family: Arial, sans-serif; line-height: 1.6; color: #222;">
    <h2 style="color: #1a5fb4;">Verify your email</h2>
    <p>
      Please confirm your email address <strong>{{ email }}</strong> for
      <strong>{{ app_name }}</strong>.
    </p>
    <p>
      <a
        href="{{ verify_url }}"
        style="
          display: inline-block;
          background: #1a5fb4;
          color: #fff;
          text-decoration: none;
          padding: 12px 24px;
          border-radius: 6px;
          font-weight: bold;
        "
      >
        Verify email
      </a>
    </p>
    <p style="font-size: 0.9em; color: #555;">
      Or copy this link: <a href="{{ verify_url }}">{{ verify_url }}</a>
    </p>
    <p style="font-size: 0.9em; color: #666;">
      This link expires in {{ expires_hours }} hours.
    </p>
  </body>
</html>
