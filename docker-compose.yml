services:
  db:
    image: postgres:16
    container_name: django_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: auth_service
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth-service:/app
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${AUTH_DB_NAME:-auth_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      APP_NAME: ${APP_NAME:-KiddoPath}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-30}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@localhost}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    command: python manage.py runserver 0.0.0.0:8000

  task-service:
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: task_service
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8002:8000"
    volumes:
      - ./services/task-service:/app
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${TASK_DB_NAME:-task_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      APP_NAME: ${APP_NAME:-KiddoPath}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      GAMIFICATION_INTERNAL_URL: ${GAMIFICATION_INTERNAL_URL:-http://gamification-service:8000}
    command: python manage.py runserver 0.0.0.0:8000

  gamification-service:
    build:
      context: ./services/gamification-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: gamification_service
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8003:8000"
    volumes:
      - ./services/gamification-service:/app
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${GAMIFICATION_DB_NAME:-gamification_db}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      APP_NAME: ${APP_NAME:-KiddoPath}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    build:
      context: ./security
      dockerfile: dockerfile
    container_name: nginx_proxy
    depends_on:
      - auth-service
      - task-service
      - gamification-service
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./security/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./security/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  frontend_node_modules:
