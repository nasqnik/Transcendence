# KiddoPath — Docker Compose
#
# Network: default bridge (mariam_backend_default). Services reach each other
# by name (e.g. auth-service:8000, db). Only nginx publishes host ports 80/443.
#
# Config: copy .env.example → .env (gitignored). Each Django service loads
# .env and overrides DB_NAME for its own database.

x-django-service: &django-service
  depends_on:
    db:
      condition: service_healthy
  env_file: .env
  command: python manage.py runserver 0.0.0.0:8000

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  db:
    image: postgres:16
    container_name: django_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis_broker
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend services
  # ---------------------------------------------------------------------------

  auth-service:
    <<: *django-service
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: auth_service
    volumes:
      - ./services/auth-service:/app
    environment:
      DB_NAME: ${AUTH_DB_NAME:-auth_db}

  task-service:
    <<: *django-service
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: task_service
    volumes:
      - ./services/task-service:/app
    environment:
      DB_NAME: ${TASK_DB_NAME:-task_db}

  gamification-service:
    <<: *django-service
    build:
      context: ./services/gamification-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: gamification_service
    volumes:
      - ./services/gamification-service:/app
    environment:
      DB_NAME: ${GAMIFICATION_DB_NAME:-gamification_db}

  analytics-service:
    <<: *django-service
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: analytics_service
    volumes:
      - ./services/analytics-service:/app
    environment:
      DB_NAME: ${ANALYTICS_DB_NAME:-analytics_db}

  notification-service:
    <<: *django-service
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: notification_service
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/notification-service:/app
    environment:
      DB_NAME: ${NOTIFICATION_DB_NAME:-notification_db}
      REDIS_URL: redis://redis:6379
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application

  catalog-service:
    <<: *django-service
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
      args:
        DOCKER_UID: ${DOCKER_UID}
        DOCKER_GID: ${DOCKER_GID}
    container_name: catalog_service
    volumes:
      - ./services/catalog-service:/app
    environment:
      DB_NAME: ${CATALOG_DB_NAME:-catalog_db}

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      VITE_API_URL: /api
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  # ---------------------------------------------------------------------------
  # Reverse proxy (only service exposed to the host)
  # ---------------------------------------------------------------------------

  nginx:
    build:
      context: ./security
      dockerfile: dockerfile
    container_name: nginx_proxy
    depends_on:
      - auth-service
      - task-service
      - gamification-service
      - analytics-service
      - notification-service
      - catalog-service
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./security/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./security/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  frontend_node_modules:
