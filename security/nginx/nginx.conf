events {}

http {
    # -------------------------------------------------------------------------
    # Global proxy defaults (applied to all location blocks below)
    # -------------------------------------------------------------------------
    # proxy is an intermediary server that sits between your device and the broader internet

    proxy_set_header Host $host;
    # proxy_http_version 1.1: use HTTP/1.1 protocol , used for websocket connections
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # -------------------------------------------------------------------------
    # Upstreams — Docker service names on the compose network
    # upstream is a way to define a group of servers that can be used to proxy requests to.
    # -------------------------------------------------------------------------
    upstream frontend_app       { server frontend:5173; }
    upstream auth_api           { server auth-service:8000; }
    upstream task_api           { server task-service:8000; }
    upstream gamification_api   { server gamification-service:8000; }
    upstream analytics_api      { server analytics-service:8000; }
    upstream notification_api   { server notification-service:8000; }
    upstream catalog_api        { server catalog-service:8000; }
    upstream social_api         { server social-service:8000; }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS — single entry point for browser and API clients
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name localhost;
        client_max_body_size 2M;

        error_page 413 @413_json;
        location @413_json {
            default_type application/json;
            return 413 '{"detail": "File too large. Maximum upload size is 2MB."}';
        }

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # --- auth-service: static assets & admin (must stay on auth_api) ---

        # django built-in static files(CSS, JS, images, etc.)
        # used by
        # 1. The admin site
        # 2. drf-spectacular : is a third-party add-on for Django REST Framework (DRF).
        # 3. Swagger UI
        location /static/ {
            proxy_pass http://auth_api;
        }

        # django built-in admin site
        location /admin/ {
            proxy_pass http://auth_api;
        }

        # --- microservice APIs (specific prefixes before /api/ catch-all) ---

        # task-service — task create/update stream SSE (disable buffering)
        location = /api/task/tasks/ {
            proxy_pass http://task_api;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        location ~ ^/api/task/tasks/[0-9a-f-]+/$ {
            proxy_pass http://task_api;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        # task-service
        location /api/task/ {
            proxy_pass http://task_api;
        }

        # gamification-service
        location /api/gamification/ {
            proxy_pass http://gamification_api;
        }

        # analytics-service
        location /api/analytics/ {
            proxy_pass http://analytics_api;
        }

        # notification-service
        location /api/notification/ {
            proxy_pass http://notification_api;
        }

        # catalog-service
        location /api/catalog/ {
            proxy_pass http://catalog_api;
        }

        # social-service
        location /api/social/ {
            proxy_pass http://social_api;
        }

        # --- auth-service: remaining /api/* (login, users, docs, schema, …) ---

        # auth-service
        location /api/ {
            proxy_pass http://auth_api/api/;
        }

        # notification-service websocket
        location /ws/notifications/ {
            proxy_pass http://notification_api;
        }

        # social-service websocket (presence)
        location /ws/presence/ {
            proxy_pass http://social_api;
        }

        # --- frontend (React dev server) ---

        # frontend
        location / {
            proxy_pass http://frontend_app;
        }
    }
}


# any variable that starts with $ is a variable that is set by the client.
# | Variable	                 | Where it comes from	                                         | Example                    |
# |------------------------------|---------------------------------------------------------------|----------------------------|
# | $host	                     | The Host header from the browser (domain you typed)	         | localhost                  |
# | $scheme	                     | How the client connected to nginx	                         | https or http              |
# | $http_upgrade	             | The Upgrade header from the browser (if present)	             | websocket (for hot reload) |
# | $proxy_add_x_forwarded_for   | Built from the client IP + any existing X-Forwarded-For chain | 192.168.1.5                |
