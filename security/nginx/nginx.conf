events {}

# http block is the main block for the nginx configuration.
# handles all http requests. "web traffic"
http {
    # common proxy settings
    # proxy means : a person authorized to act on behalf of someone else, or a substitute used to represent something else
    # in this case, we are using a proxy to forward requests to the frontend and backend services.
    # when we send the requests , we need to send some information.

    # 1. Host — tell Vite/Django the browser asked for "localhost", not "frontend" (avoids blocked host errors).
    proxy_set_header Host $host;
    # 2. HTTP/1.1 — required so the connection can switch to WebSockets (Vite hot reload in dev).
    proxy_http_version 1.1;
    # 3. Upgrade — pass through the browser's "please use WebSocket" header to the frontend.
    proxy_set_header Upgrade $http_upgrade;
    # 4. Connection upgrade — allow that WebSocket switch; without it, live reload may break behind nginx.
    proxy_set_header Connection "upgrade";

    # upstream blocks are used to define servers.
    upstream frontend_app { server frontend:5173; }
    upstream backend_api  { server backend:8000; }

    # Plain HTTP → force HTTPS (browser hits http://localhost → https://localhost/...)
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Django admin (urls.py has /admin/, not /api/admin/)
        location /admin/ {
            proxy_pass http://backend_api;
        }

        # API: keep /api prefix so Django paths match (urls use api/auth/...)
        location /api/ {
            proxy_pass http://backend_api/api/;
        }

        # Everything else → React/Vite
        location / {
            proxy_pass http://frontend_app;
        }
    }
}
